
<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Login User</title>

<style>

body{
font-family:Segoe UI;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:360px;
background:#1f2937;
padding:30px;
border-radius:15px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:none;
}

button{
margin-top:15px;
width:100%;
padding:10px;
border:none;
background:#2563eb;
color:white;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.switch{
margin-top:15px;
text-align:center;
cursor:pointer;
color:#60a5fa;
}

.inbox{
position:absolute;
top:20px;
right:20px;
font-size:26px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="inbox" onclick="location.href='inbox.html'">📥</div>

<div class="container">

<h2 id="title">Sign In</h2>

<input id="username" placeholder="Username">

<input id="email" placeholder="Email (Signup only)" style="display:none">

<input type="password" id="password" placeholder="Password">

<input type="password" id="confirm" placeholder="Confirm Password" style="display:none">

<button onclick="proses()">Masuk</button>

<div class="switch" onclick="toggle()">Belum punya akun? Signup</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getDatabase,
ref,
set,
get,
child
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";


const firebaseConfig = {
apiKey: "AIzaSyAG4qda-B8j2k6nOl6krNgRqc7VIDgbPqs",
authDomain: "phishing-report-21e2c.firebaseapp.com",
databaseURL: "https://phishing-report-21e2c-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "phishing-report-21e2c",
storageBucket: "phishing-report-21e2c.firebasestorage.app",
messagingSenderId: "276758713826",
appId: "1:276758713826:web:945436655ff290283655bb"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let mode = "signin";

window.toggle = function(){

mode = mode === "signin" ? "signup" : "signin";

document.getElementById("title").innerText =
mode === "signin" ? "Sign In" : "Sign Up";

document.getElementById("email").style.display =
mode === "signup" ? "block" : "none";

document.getElementById("confirm").style.display =
mode === "signup" ? "block" : "none";

}

window.proses = async function(){

const username = document.getElementById("username").value.trim();
const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value;
const confirm = document.getElementById("confirm").value;

try{

if(mode === "signup"){

if(!username || !email || !password){
alert("Semua field harus diisi");
return;
}

if(password !== confirm){
alert("Password tidak sama");
return;
}

const userCredential =
await createUserWithEmailAndPassword(auth,email,password);

await set(ref(db,"users/"+username),{
uid:userCredential.user.uid,
email:email
});

alert("Signup berhasil!");

location.href="index.html";

}

else{

const snapshot = await get(child(ref(db),"users/"+username));

if(!snapshot.exists()){
alert("Username tidak ditemukan");
return;
}

const data = snapshot.val();

await signInWithEmailAndPassword(auth,data.email,password);

alert("Login berhasil");

location.href="index.html";

}

}catch(error){

alert(error.message);

}

}

</script>

</body>
</html>
