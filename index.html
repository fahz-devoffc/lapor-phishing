
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LAPOR | Layanan Report</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
}

.topbar{
position:absolute;
top:20px;
right:30px;
}

.loginbtn{
background:#2563eb;
padding:8px 16px;
border-radius:8px;
color:white;
text-decoration:none;
font-weight:600;
margin-left:10px;
cursor:pointer;
}

#welcome{
margin-right:15px;
color:#38bdf8;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:40px;
}

.title{
font-size:34px;
font-weight:bold;
}

.subtitle{
opacity:.7;
margin-bottom:30px;
}

.card{
background:#111827;
padding:25px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

textarea{
width:100%;
height:120px;
background:#0f172a;
border:none;
border-radius:10px;
padding:15px;
color:white;
resize:none;
}

button{
margin-top:15px;
padding:12px 25px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;
font-weight:600;
}

.report{
background:#1f2937;
padding:15px;
border-radius:10px;
margin-top:10px;
}

.time{
font-size:12px;
opacity:0.6;
}

.section{
margin-top:40px;
}

</style>
</head>

<body>

<div class="topbar">

<span id="welcome"></span>

<a id="loginBtn" class="loginbtn" href="login.html">Login</a>

<a id="inboxBtn" class="loginbtn" href="inbox.html" style="display:none;">Inbox</a>

<a id="logoutBtn" class="loginbtn" style="display:none;">Keluar</a>

</div>

<div class="container">

<div class="title">🚨 Lapor Apapun itu</div>
<div class="subtitle">Laporkan kronologi ataupun link berbahaya</div>

<div class="card">

<label>Kronologi</label>

<textarea id="kronologi" placeholder="Tuliskan kronologi/link..."></textarea>

<button onclick="kirim()">Kirim Laporan</button>

</div>

<div class="section">
<h2>📥 Laporan Terkumpul (Pending)</h2>
<div id="pendingReports"></div>
</div>

<div class="section">
<h2>✅ Laporan Selesai</h2>
<div id="doneReports"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import { 
getDatabase,
ref,
push,
onChildAdded,
get
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";


const firebaseConfig = {
apiKey: "AIzaSyAG4qda-B8j2k6nOl6krNgRqc7VIDgbPqs",
authDomain: "phishing-report-21e2c.firebaseapp.com",
databaseURL: "https://phishing-report-21e2c-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "phishing-report-21e2c",
storageBucket: "phishing-report-21e2c.firebasestorage.app",
messagingSenderId: "276758713826",
appId: "1:276758713826:web:945436655ff290283655bb"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const reportsRef = ref(db,"reports");

let currentUser = null;

const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");
const inboxBtn = document.getElementById("inboxBtn");
const welcome = document.getElementById("welcome");


/* =========================
   FIREBASE AUTH SECTION
========================= */

onAuthStateChanged(auth, async (user)=>{

currentUser = user;

if(user){

loginBtn.style.display="none";
logoutBtn.style.display="inline-block";
inboxBtn.style.display="inline-block";

let username = "User";

const snapshot = await get(ref(db,"users"));

snapshot.forEach(child=>{

if(child.val().uid === user.uid){
username = child.key;
}

});

welcome.innerText="Welcome back "+username;

setTimeout(()=>{
welcome.innerText="";
},5000);

}else{

loginBtn.style.display="inline-block";
logoutBtn.style.display="none";
inboxBtn.style.display="none";
welcome.innerText="";

}

});


logoutBtn.onclick = function(){

signOut(auth);

location.reload();

};


/* =========================
   KIRIM LAPORAN
========================= */

window.kirim = function(){

if(!currentUser){

alert("Silakan login terlebih dahulu");

location.href="login.html";

return;

}

const kronologi = document.getElementById("kronologi").value;

if(!kronologi) return;

push(reportsRef,{
kronologi:kronologi,
time:new Date().toLocaleString(),
status:"pending",
uid:currentUser.uid
});

document.getElementById("kronologi").value="";

}


/* =========================
   TAMPILKAN LAPORAN
========================= */

const pendingDiv = document.getElementById("pendingReports");
const doneDiv = document.getElementById("doneReports");

onChildAdded(reportsRef,(snapshot)=>{

const data = snapshot.val();

const div = document.createElement("div");

div.className="report";

div.innerHTML = `
<div>${data.kronologi}</div>
<div class="time">${data.time}</div>
`;

if(data.status === "done"){
doneDiv.prepend(div);
}else{
pendingDiv.prepend(div);
}

});

</script>

</body>
</html>
