<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lapor Korban Phishing</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
}

.container{
max-width:900px;
margin:auto;
padding:40px;
}

.title{
font-size:34px;
font-weight:bold;
}

.subtitle{
opacity:.7;
margin-bottom:30px;
}

.card{
background:#111827;
padding:25px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

textarea{
width:100%;
height:120px;
background:#0f172a;
border:none;
border-radius:10px;
padding:15px;
color:white;
resize:none;
}

button{
margin-top:15px;
padding:12px 25px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;
font-weight:600;
}

.report{
background:#1f2937;
padding:15px;
border-radius:10px;
margin-top:10px;
}

.time{
font-size:12px;
opacity:0.6;
}

.section{
margin-top:40px;
}

</style>

</head>

<body>

<div class="container">

<div class="title">🚨 Lapor Korban Phishing</div>
<div class="subtitle">Laporkan kronologi kejadian phishing</div>

<div class="card">

<label>Kronologi Kejadian</label>

<textarea id="kronologi" placeholder="Tuliskan kronologi phishing..."></textarea>

<button onclick="kirim()">Kirim Laporan</button>

</div>


<div class="section">

<h2>📥 Laporan Terkumpul (Pending)</h2>

<div id="pendingReports"></div>

</div>


<div class="section">

<h2>✅ Laporan Selesai</h2>

<div id="doneReports"></div>

</div>


</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAG4qda-B8j2k6nOl6krNgRqc7VIDgbPqs",
  authDomain: "phishing-report-21e2c.firebaseapp.com",
  databaseURL: "https://phishing-report-21e2c-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "phishing-report-21e2c",
  storageBucket: "phishing-report-21e2c.firebasestorage.app",
  messagingSenderId: "276758713826",
  appId: "1:276758713826:web:945436655ff290283655bb",
  measurementId: "G-13GQ33JGWL"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const reportsRef = ref(db,"reports");

window.kirim = function(){

const kronologi = document.getElementById("kronologi").value;

if(!kronologi) return;

push(reportsRef,{
kronologi:kronologi,
time:new Date().toLocaleString(),
status:"pending"
});

document.getElementById("kronologi").value="";

}

const pendingDiv = document.getElementById("pendingReports");
const doneDiv = document.getElementById("doneReports");

onChildAdded(reportsRef,(snapshot)=>{

const data = snapshot.val();

const div = document.createElement("div");

div.className="report";

div.innerHTML = `
<div>${data.kronologi}</div>
<div class="time">${data.time}</div>
`;

if(data.status === "done"){

doneDiv.prepend(div);

}else{

pendingDiv.prepend(div);

}

});

</script>

</body>
</html>
