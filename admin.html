
<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>

body{
font-family:Segoe UI;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}

h1{
margin-bottom:20px;
}

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.card{
background:#1f2937;
padding:20px;
border-radius:12px;
}

.report{
padding:10px;
border-bottom:1px solid #333;
margin-bottom:10px;
}

button{
margin-top:5px;
margin-right:5px;
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.done{
background:#22c55e;
color:white;
}

.delete{
background:#ef4444;
color:white;
}

.topbar{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

a{
color:#60a5fa;
text-decoration:none;
}

</style>

</head>

<body>

<div class="topbar">
<h1>Admin Dashboard</h1>
<a href="data.html">User</a>
</div>

<div class="dashboard">

<div class="card">
<h2>Laporan Pending</h2>
<div id="pending"></div>
</div>

<div class="card">
<h2>Laporan Selesai</h2>
<div id="done"></div>
</div>

<div class="card">
<h2>🔐 Login Request</h2>
<div id="requests"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getDatabase,
ref,
onValue,
update,
remove
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const token = prompt("Masukkan Admin Token");

if(token !== "admintoken"){
alert("Token salah");
location.href="index.html";
}

/* FIREBASE CONFIG */

const firebaseConfig = {
apiKey: "AIzaSyAG4qda-B8j2k6nOl6krNgRqc7VIDgbPqs",
authDomain: "phishing-report-21e2c.firebaseapp.com",
databaseURL: "https://phishing-report-21e2c-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "phishing-report-21e2c",
storageBucket: "phishing-report-21e2c.firebasestorage.app",
messagingSenderId: "276758713826",
appId: "1:276758713826:web:945436655ff290283655bb"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* =========================
   LAPORAN
========================= */

const reportRef = ref(db,"reports");

const pendingDiv = document.getElementById("pending");
const doneDiv = document.getElementById("done");

onValue(reportRef,(snapshot)=>{

pendingDiv.innerHTML="";
doneDiv.innerHTML="";

snapshot.forEach(child=>{

const id = child.key;
const data = child.val();

const div = document.createElement("div");
div.className="report";

div.innerHTML = `
<b>${data.username || "Anonim"}</b><br>
${data.kronologi}
`;

if(data.status === "done"){

doneDiv.appendChild(div);

}else{

const doneBtn = document.createElement("button");
doneBtn.innerText="Terima";
doneBtn.className="done";

doneBtn.onclick=function(){

update(ref(db,"reports/"+id),{
status:"done"
});

};

const delBtn = document.createElement("button");
delBtn.innerText="Hapus";
delBtn.className="delete";

delBtn.onclick=function(){

remove(ref(db,"reports/"+id));

};

div.appendChild(doneBtn);
div.appendChild(delBtn);

pendingDiv.appendChild(div);

}

});

});

/* =========================
   LOGIN REQUEST
========================= */

const requestRef = ref(db,"loginRequests");
const requestDiv = document.getElementById("requests");

onValue(requestRef,(snapshot)=>{

requestDiv.innerHTML="";

snapshot.forEach(child=>{

const username = child.key;
const data = child.val();

if(data.approved === true) return;

const div = document.createElement("div");
div.className="report";

div.innerHTML=`
<b>${username}</b><br>
Meminta izin login
`;

const btn = document.createElement("button");
btn.innerText="Terima";
btn.className="done";

btn.onclick=function(){

update(ref(db,"loginRequests/"+username),{
approved:true
});

};

div.appendChild(btn);

requestDiv.appendChild(div);

});

});

</script>

</body>
</html>
