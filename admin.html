<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>

body{
font-family:Segoe UI;
background:#0f172a;
color:white;
padding:40px;
}

.card{
background:#1f2937;
padding:15px;
border-radius:10px;
margin-top:10px;
}

button{
background:#22c55e;
border:none;
padding:8px 15px;
border-radius:8px;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Admin Dashboard</h1>

<h2>Laporan Pending</h2>

<div id="reports"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onChildAdded, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyAG4qda-B8j2k6nOl6krNgRqc7VIDgbPqs",
authDomain: "phishing-report-21e2c.firebaseapp.com",
databaseURL: "https://phishing-report-21e2c-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "phishing-report-21e2c"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const reportsRef = ref(db,"reports");

onChildAdded(reportsRef,(snapshot)=>{

const data = snapshot.val();
const id = snapshot.key;

if(data.status === "done") return;

const div = document.createElement("div");
div.className="card";

div.innerHTML = `
<p>${data.kronologi}</p>
<small>${data.time}</small>
<br><br>
<button onclick="selesaikan('${id}')">Tandai Selesai</button>
`;

document.getElementById("reports").prepend(div);

});

window.selesaikan = function(id){

const reportRef = ref(db,"reports/"+id);

update(reportRef,{
status:"done"
});

alert("Laporan ditandai selesai");

}

</script>

</body>
</html>
