<!DOCTYPE html>
<html>
<head>
<title>Inbox Laporan</title>
</head>

<body>

<h2>Laporan Saya</h2>

<div id="reports"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getDatabase,
ref,
onChildAdded
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyAG4qda-B8j2k6nOl6krNgRqc7VIDgbPqs",
authDomain: "phishing-report-21e2c.firebaseapp.com",
databaseURL: "https://phishing-report-21e2c-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "phishing-report-21e2c"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const reportsRef = ref(db,"reports");

auth.onAuthStateChanged(user=>{

if(!user){
alert("Silakan login");
location.href="login.html";
return;
}

onChildAdded(reportsRef,(snapshot)=>{

const data = snapshot.val();

if(data.uid !== user.uid) return;

const div = document.createElement("div");

div.innerHTML = `
<p>${data.kronologi}</p>
<p>Status: ${data.status}</p>
<hr>
`;

document.getElementById("reports").prepend(div);

});

});

</script>

</body>
</html>
